# Dataset
dataset:
  repo_id: "fish-gang/deepscan-dataset"
  revision: "v1.0" # Hugging Face dataset version
  num_classes: 14
  cache_dir: "data/hf_cache"
  force_download: false

# Model
model:
  backbones:
    - squeezenet1_1
    - mobilenet_v3_small
    - shufflenet_v2_x1_0
    - mobilenet_v3_large
    - efficientnet_b0
    - resnet50
  pretrained: true

# Data loading
data:
  batch_size: 32
  num_workers: 15
  val_split: 0.15
  test_split: 0.15
  image_size: 224

# Training
training:
  max_epochs: 1
  lr: 0.0001
  log_every_n_steps: 10
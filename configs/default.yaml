# Model
model:
  backbone: efficientnet_b4
  num_classes: 12
  pretrained: true

# Data
data:
  dataset_revision: "v0.1" # Hugging Face dataset version
  batch_size: 32
  num_workers: 4
  val_split: 0.15
  test_split: 0.15
  image_size: 224

# Training
training:
  max_epochs: 10
  lr: 0.001
  log_every_n_steps: 10